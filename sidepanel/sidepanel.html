<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth Engine Sidebar</title>
    <!-- Tailwind CSS -->
    <link href="./tailwind.css" rel="stylesheet">
    <!-- Marked.js -->
    <script src="./marked.min.js"></script>
    <style>
        /* Custom Markdown styling */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }
        .markdown-body h1 { font-size: 1.5rem; }
        .markdown-body h2 { font-size: 1.25rem; }
        .markdown-body h3 { font-size: 1.125rem; }
        .markdown-body p { margin-bottom: 1rem; color: #374151; line-height: 1.5; }
        .markdown-body a { color: #2563eb; text-decoration: underline; }
        .markdown-body a:hover { color: #1d4ed8; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #374151; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; color: #374151; }
        .markdown-body strong { font-weight: 600; color: #111827; }
        .markdown-body blockquote { border-left: 4px solid #e5e7eb; padding-left: 1rem; color: #6b7280; font-style: italic; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #10b981;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }

        /* Safari */
        @-webkit-keyframes spin {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen font-sans text-gray-900">

    <!-- Header Navigation -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="px-4 py-3 flex justify-between items-center">
            <h1 class="text-base font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="url(#emerald-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="emerald-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#059669"/>
                            <stop offset="100%" stop-color="#14b8a6"/>
                        </linearGradient>
                    </defs>
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                Truth Engine
            </h1>
            <button id="nav-settings-btn" class="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-md transition-colors" title="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto w-full relative">
        
        <!-- View 1: Settings -->
        <div id="settings-view" class="hidden p-5 w-full flex flex-col gap-4 max-w-lg mx-auto">
            <h2 class="text-xl font-bold text-gray-800">Settings</h2>
            <div class="flex flex-col gap-1.5">
                <label for="api-key-input" class="text-sm font-semibold text-gray-700">Gemini API Key</label>
                <div class="relative w-full">
                    <input type="password" id="api-key-input" placeholder="Enter your Gemini API key" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-sm font-mono placeholder:font-sans pr-10">
                    <button id="toggle-key-visibility" type="button" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-gray-700">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <p class="text-xs text-gray-500">Requires a key with access to Gemini 2.0 Flash.</p>
            </div>
            
            <div class="flex gap-3 mt-2">
                <button id="save-key-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition-colors text-sm">
                    Save Key
                </button>
                <button id="test-key-btn" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg font-medium shadow-sm transition-colors text-sm">
                    Test Key
                </button>
            </div>
            
            <div id="settings-status" class="mt-2 text-sm hidden px-3 py-2 rounded-md"></div>
            
            <div class="mt-8 border-t border-gray-200 pt-6">
                <button id="back-to-main-btn" class="text-sm text-emerald-600 font-medium hover:text-emerald-700 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Back to Truth Engine
                </button>
            </div>
        </div>

        <!-- View 2: Main Engine View -->
        <div id="main-view" class="p-5 flex flex-col gap-4 max-w-lg mx-auto w-full">
            
            <!-- Empty State -->
            <div id="empty-state" class="flex flex-col items-center justify-center py-12 px-4 text-center">
                <div class="bg-emerald-100 p-4 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <polyline points="11 8 11 12 14 15"></polyline>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">Ready to Verify</h3>
                <p class="text-sm text-gray-600 max-w-[250px]">
                    Highlight text on any webpage and click the "Verify Claim" button to cross-reference it with academic data.
                </p>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="hidden flex flex-col items-center justify-center py-16 px-4 text-center">
                <div class="loader mb-4"></div>
                <h3 class="text-sm font-bold text-emerald-600 mb-1">Verifying claim...</h3>
                <p class="text-xs text-gray-500 italic max-w-xs" id="claim-preview">
                    "Loading claim text"
                </p>
            </div>
            
            <!-- Results State -->
            <div id="results-state" class="hidden flex flex-col gap-4">
                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex items-start gap-2 mb-3 pb-3 border-b border-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" class="mt-0.5 shrink-0"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        <p class="text-xs text-gray-600 italic leading-snug" id="result-claim-text">
                            "The claim"
                        </p>
                    </div>
                    
                    <div id="result-markdown" class="markdown-body text-sm">
                        <!-- Markdown goes here -->
                    </div>
                </div>
                
                <div id="search-suggestions" class="hidden mt-2">
                     <!-- Search Suggestions from Grounding -->
                </div>
            </div>
            
        </div>
    </main>

    <script src="./sidepanel.js"></script>
</body>
</html>
